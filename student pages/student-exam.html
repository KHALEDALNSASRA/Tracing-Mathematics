<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examify — Calculus II Exam</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="student-exam.css">
<script type="module" src="student-exam.js" defer></script>

</head>
<body>


 <!-- Exam Header -->
<header class="exam-header">
  <div class="exam-header__inner">
    <a class="brand" href="../student pages/student-dashboard.html">
      <span class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 5.5C4 4.67 4.67 4 5.5 4H11V19H5.5C4.67 19 4 19.67 4 20.5V5.5Z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M20 5.5C20 4.67 19.33 4 18.5 4H13V19H18.5C19.33 19 20 19.67 20 20.5V5.5Z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand-name">Examify</span>
    </a>
 
    <!-- Question Counter -->
    <div class="question-counter" id="questionCounter">
      Question <span id="currentQuestionNumber">-</span> of <span id="totalQuestions">-</span>
    </div>
  </div>
</header>
 
<!-- Main exam area -->
<main class="exam-main">
  <div class="exam-wrap">
 
    <!-- Question Card -->
    <section class="question-card" id="questionCard">
 
      <!-- Question Text (populated by JS) -->
      <p class="question-text" id="questionText"></p>
 
      <!-- Optional helper / working box (populated by JS if present) -->
      <div class="question-helper" id="questionHelper" hidden></div>
 
      <!-- Answers Container (populated by JS) -->
      <div class="answers-container" id="answersContainer"></div>
 
    </section>
 
    <!-- Navigation Buttons Container -->
    <nav class="navigation" id="navigation">
      <button type="button" class="btn btn--prev" id="previousBtn" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Previous
      </button>
 
      <button type="button" class="btn btn--next" id="nextBtn" hidden>
        Next
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
 
      <button type="button" class="btn btn--submit" id="submitBtn" hidden>
        Submit
      </button>
    </nav>
 
  </div>
</main>



</body>
</html>
