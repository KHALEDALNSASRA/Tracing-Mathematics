<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examify — Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../style/style.css">
<link rel="stylesheet" href="./student-dashboard.css">
<link rel="stylesheet" href="./profile.css">
<script type="module" src="profile.js" defer></script>

</head>
<body>

<div class="profile-name-wrap">
    <span class="profile-name-badge" id="studentName"></span>
</div>

<hr class="profile-divider">

<div class="profile-info-grid">

    <div class="profile-info-item">
        <div class="profile-info-label">Student ID</div>
        <div class="profile-info-value" id="studentId"></div>
    </div>

    <div class="profile-info-item">
        <div class="profile-info-label">Email</div>
        <div class="profile-info-value" id="studentEmail"></div>
    </div>

    <div class="profile-info-item">
        <div class="profile-info-label">Average</div>
        <div class="profile-info-value" id="studentAverage"></div>
    </div>

    <div class="profile-info-item">
        <div class="profile-info-label">Your teacher</div>
        <div class="profile-info-value" id="teacherName"></div>
    </div>

</div>

</body>
</html>
