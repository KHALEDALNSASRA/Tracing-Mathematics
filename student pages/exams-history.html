<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examify Exams History</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../style/style.css">
<link rel="stylesheet" href="./student-dashboard.css">
<link rel="stylesheet" href="./exams-history.css">
</head>
<body>

<input type="checkbox" id="sidebar-toggle" class="sidebar-toggle">

<div class="app-shell">

  <label for="sidebar-toggle" class="sidebar-scrim" aria-hidden="true"></label>

  <aside class="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo-img" src="./assets/Examify.png" alt="Examify logo">
      <span class="sidebar-logo-text">Examify</span>
      <label for="sidebar-toggle" class="sidebar-collapse-btn" role="button" aria-label="Toggle sidebar">
        <i class="fas fa-chevron-left"></i>
      </label>
    </div>

    <nav class="sidebar-nav">
      <a href="student-dashboard.html" class="sidebar-item">
        <i class="fas fa-house"></i>
        <span class="sidebar-label">Home</span>
      </a>
      <a href="exams-history.html" class="sidebar-item sidebar-item--active">
        <i class="fas fa-pen-to-square"></i>
        <span class="sidebar-label">Exams History</span>
      </a>
      <a href="profile.html" class="sidebar-item">
        <i class="fa-regular fa-circle-user"></i>
        <span class="sidebar-label">Profile</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" class="sidebar-item" id="logout-btn">
        <i class="fas fa-right-from-bracket"></i>
        <span class="sidebar-label">Sign out</span>
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <label for="sidebar-toggle" class="topbar-burger" role="button" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </label>
      <span class="topbar-title">Home</span>
    </header>

    <div class="content">

      <section class="history-panel">
        <h2 class="history-panel-title">Exams history</h2>

        <div class="history-grid" id="history-grid-container"></div>
      </section>

    </div>
  </div>

</div>

<script type="module">
    import * as db from "../Database.js";

    document.addEventListener("DOMContentLoaded", () => {
        const session = db.getCurrentSession();
        if (!session) return;

        const studentId = session.userId;
        const studentResults = db.getResultsByStudent(studentId);
        const currentStudent = db.getStudent(studentId); 

        const container = document.getElementById("history-grid-container");
        container.innerHTML = "";

        if (studentResults.length === 0) {
            container.innerHTML = "<p>You haven't taken any exams yet..</p>";
            return;
        }

        for (let i = studentResults.length - 1; i >= 0; i--) {
            const res = studentResults[i];
            const examData = db.getExam(res.examId);
            const isPassed = Number(res.earnedPoints) >= (Number(res.totalPoints) / 2);
            
            const statusClass = isPassed ? "badge--success" : "badge--danger";
            const statusText = isPassed ? "Passed" : "Failed";
            const realResultId = currentStudent.results[i];

            const card = document.createElement("article");
            card.className = "history-card";
            card.innerHTML = `
                <div class="history-card-top">
                    <div class="history-card-icon"><i class="fa-regular fa-pen-to-square"></i></div>
                    <span class="badge ${statusClass}">${statusText}</span>
                </div>
                <div class="history-card-body">
                    <span class="history-card-title">${examData ? examData.title : "Exam"}</span>
                    <span class="history-card-type">Exam</span>
                </div>
                <div class="history-card-meta">
                    <span class="history-card-score">${res.earnedPoints}/${res.totalPoints}</span>
                    <span>• ${examData && examData.questions ? examData.questions.length : 0} Q</span>
                </div>
                <button class="btn btn--primary review-btn" data-id="${realResultId}">Review my answers</button>
            `;
            container.appendChild(card);
        }

        container.querySelectorAll(".review-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const resultId = e.target.getAttribute("data-id");
                window.location.href = `review-answers.html?resultId=${resultId}`;
            });
        });
    });
</script>
</body>
</html>
