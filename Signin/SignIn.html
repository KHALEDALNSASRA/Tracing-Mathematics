<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
    <link rel="stylesheet" href="SignInStyle.css">
    <script  type="module" src="Sigin.js" defer></script>
</head>
<body>
    
<div class="auth-card">
  <div class="auth-logo">
    <img src="../pic/logo.png" alt="Examify logo">
  </div>
 
  <h1>Welcome back</h1>
  <p class="sub">Enter your credentials to access your account.</p>
 
  <form id="createTeacher">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" placeholder="FullName" required>
    </div>
 
    <div class="form-group">
      <label for="email">Username</label>
      <input id="email" type="email" placeholder="Username" required>
    </div>
 
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrap">
        <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"/></svg>
        <input id="password" type="password" placeholder="••••••••••••••"required>
      </div>
    </div>
 
    <div class="auth-row">
      <label class="remember">
        <input type="checkbox">
        Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
 
    <button type="submit" class="submit-btn">Create Account</button>
  </form>
</div>
    
</body>
</html>
